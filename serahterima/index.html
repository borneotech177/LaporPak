<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serah Terima Shift — PT.RSS × PA Bengkayang</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');
  :root {
    --green:#1e7c45; --green-dark:#155c32; --green-light:#27a05a;
    --green-pale:#e8f5ee; --green-border:#b2d9c0;
    --blue:#1a3c8c;
    --bg:#f2f7f4; --surface:#ffffff; --surface2:#f0f7f3;
    --text:#1a3328; --text-dim:#5a7a68; --border:#c8e0d2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;min-height:100vh;padding:16px}

  /* HEADER */
  header{background:linear-gradient(135deg,#0d3d22 0%,#155c32 50%,#1a3c8c 100%);border-radius:12px;padding:12px 16px 14px;margin-bottom:14px;position:relative;overflow:hidden;box-shadow:0 4px 16px rgba(21,92,50,.3)}
  .header-inner{display:flex;align-items:center;gap:10px;position:relative;z-index:1}
  .logo-box{background:rgba(255,255,255,.92);border-radius:8px;padding:4px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .logo-box img{width:44px;height:44px;object-fit:contain}
  .logo-sep{width:1px;height:46px;background:rgba(255,255,255,.22);flex-shrink:0}
  .hdr-txt{flex:1;text-align:center}
  .hdr-txt .brand{font-size:9px;letter-spacing:3px;color:#a8d8b8;text-transform:uppercase;font-weight:600}
  .hdr-txt h1{font-size:19px;font-weight:700;color:#fff;letter-spacing:1px;margin-top:2px}
  .hdr-txt .sub{font-size:10px;color:#a8c4e0;letter-spacing:2px}

  /* SECTION */
  .section{background:#fff;border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:11px;box-shadow:0 1px 4px rgba(30,124,69,.06)}
  .section-title{font-size:11px;letter-spacing:3px;color:var(--green);text-transform:uppercase;font-weight:700;margin-bottom:11px;display:flex;align-items:center;gap:8px}
  .section-title::before{content:'';width:4px;height:13px;background:var(--green);border-radius:2px;flex-shrink:0}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border)}
  .row{margin-bottom:10px}
  label{display:block;font-size:12px;color:var(--text-dim);letter-spacing:1px;margin-bottom:4px;font-weight:600;text-transform:uppercase}
  input,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;padding:8px 10px;outline:none;transition:border-color .2s,box-shadow .2s}
  input:focus,select:focus{border-color:var(--green-light);box-shadow:0 0 0 3px rgba(30,124,69,.1)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  /* SHIFT PILLS */
  .shift-pills{display:flex;gap:8px;flex-wrap:wrap}
  .shift-pill{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;border:2px solid var(--border);cursor:pointer;transition:all .15s;background:var(--surface2);color:var(--text-dim)}
  .shift-pill.active-pagi{background:#fff3cd;border-color:#f0a500;color:#7a5800}
  .shift-pill.active-malam{background:#e8eaf6;border-color:#5c6bc0;color:#283593}
  .shift-pill.active-non{background:var(--green-pale);border-color:var(--green);color:var(--green-dark)}

  /* PERSONIL */
  .personil-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .personil-card{display:flex;align-items:center;gap:8px;background:var(--surface2);border:2px solid var(--border);border-radius:8px;padding:9px 10px;cursor:pointer;transition:all .15s;user-select:none}
  .personil-card.selected{border-color:var(--green);background:var(--green-pale)}
  .personil-card .avatar{width:28px;height:28px;border-radius:50%;background:var(--green-dark);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .personil-card.selected .avatar{background:var(--green)}
  .personil-card .pname{font-size:13px;font-weight:600;color:var(--text);line-height:1.2}
  .personil-card .check{margin-left:auto;font-size:14px;color:var(--green);display:none}
  .personil-card.selected .check{display:block}
  .personil-label{font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:600;letter-spacing:1px;text-transform:uppercase}

  /* KETERANGAN */
  .ket-item{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;margin-bottom:7px}
  .ket-item .dot{width:7px;height:7px;border-radius:50%;background:var(--green-light);flex-shrink:0}
  .ket-item input{background:transparent;border:none;box-shadow:none;padding:0;font-size:14px;color:var(--text)}
  .ket-item input:focus{border:none;box-shadow:none}
  .extra-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
  .extra-row input{flex:1;font-size:14px;background:var(--green-pale);border-color:var(--green-border)}
  .btn-del{background:none;border:1px solid #f0b0a0;color:#c0392b;border-radius:5px;width:32px;height:34px;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .btn-add-ket{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--green-pale);border:1px dashed var(--green-border);color:var(--green);border-radius:6px;padding:8px 12px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;cursor:pointer;width:100%;margin-top:4px;transition:background .2s}
  .btn-add-ket:hover{background:#d4efe0;border-color:var(--green)}

  /* FOTO */
  .foto-upload-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--green-pale);border:2px dashed var(--green-border);color:var(--green);border-radius:8px;padding:13px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;cursor:pointer;width:100%;transition:all .2s}
  .foto-upload-btn:hover{background:#d4efe0;border-color:var(--green)}
  #foto-input{display:none}
  .foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
  .foto-thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:2px solid var(--border)}
  .foto-thumb img{width:100%;height:100%;object-fit:cover}
  .foto-thumb .del-foto{position:absolute;top:3px;right:3px;background:rgba(192,57,43,.85);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
  .foto-count{font-size:12px;color:var(--text-dim);text-align:center;letter-spacing:1px;margin-top:6px}

  /* TANDA TANGAN */
  .ttd-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .ttd-box{display:flex;flex-direction:column}
  .ttd-box>label{text-align:center;margin-bottom:6px}
  .ttd-name-input{text-align:center;font-weight:700;font-size:14px;letter-spacing:1px;margin-bottom:6px}
  .sig-wrap{position:relative;border:2px solid var(--border);border-radius:8px;background:#fff;overflow:hidden}
  .sig-canvas{display:block;width:100%;height:100px;cursor:crosshair;touch-action:none}
  .sig-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:1px;color:#b0c8b8;font-weight:600;pointer-events:none;text-transform:uppercase}
  .sig-actions{display:flex;gap:5px;margin-top:5px}
  .btn-sig-clear{flex:1;background:#fff0ee;border:1px solid #f0b0a0;color:#c0392b;border-radius:5px;padding:5px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:.5px;cursor:pointer}

  /* ACTION BUTTONS */
  .btn-copy{width:100%;background:var(--green);color:#fff;border:none;border-radius:8px;padding:13px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:10px;transition:background .2s;box-shadow:0 3px 10px rgba(30,124,69,.25)}
  .btn-copy:active{background:var(--green-dark)}
  .btn-wa{width:100%;background:linear-gradient(135deg,#25d366,#128c4e);color:#fff;border:none;border-radius:8px;padding:14px;font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:8px;box-shadow:0 4px 14px rgba(18,140,78,.35);display:flex;align-items:center;justify-content:center;gap:10px;transition:opacity .2s}
  .btn-wa:active{opacity:.85}
  .btn-wa:disabled{opacity:.6;cursor:not-allowed}

  /* PREVIEW */
  .preview-box{background:#f8fff9;border:1px solid var(--green-border);border-left:4px solid var(--green);border-radius:8px;padding:14px;font-family:'Share Tech Mono',monospace;font-size:12px;line-height:1.8;color:#1a3328;white-space:pre-wrap;word-break:break-word;min-height:60px}

  /* TOAST */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green-dark);color:#fff;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;padding:10px 28px;border-radius:30px;transition:transform .3s ease;z-index:999;pointer-events:none}
  .toast.show{transform:translateX(-50%) translateY(0)}

  footer{text-align:center;font-size:11px;color:var(--text-dim);letter-spacing:2px;padding:16px 0 8px}
  #reportCanvas{display:none}
</style>
</head>
